{% extends 'base.html' %}

{% block title %}Admin{% endblock %}

{% block content %}
<div class="modalcontent">
    <div class="modalheader">
        <h2 class="modaltitle">Upload Resource</h2>
    </div>
        <input type="text" name="title" placeholder="Title *" required>
        <input type="text" name="url" placeholder="URL *" required>
        <input type="text" name="name" placeholder="Contact Name (Optional)">
        <input type="text" name="email" placeholder="Contact Email (Optional)">
        <input type="text" name="phone" placeholder="Contact Phone Number (Optional)">
        <select name="resource_category_id" required>
            <option value="">Category *</option>
            {% if categories %}
                {% for cat in categories %}
                    <option value="{{ cat.resource_category_id }}">{{ cat.resource_category_name|title }}</option>
                {% endfor %}
            {% else %}
                <option value="1">College</option>
                <option value="2">Mental</option>
                <option value="3">Jobs</option>
                <option value="4">Tutoring</option>
                <option value="5">Activities</option>
                <option value="6">Career</option>
            {% endif %}
        </select>

        <div class="modalformactions">
            <button type="button" onclick="document.getElementById('uploadModal').style.display='none'" class="modalbtncancel">Cancel</button>
            <button type="submit" class="modalbtnsubmit">Submit</button>
        </div>
</div>

<div class="modalcontent">
    <div class="modalheader">
        <h2 class="modaltitle">Edit Resource</h2>
    </div>
        <input type="hidden" id="editResourceId" name="resource_id">

        <label for="editTitle" class="modallabel">Title *</label>
        <input type="text" id="editTitle" name="title" placeholder="Title *" required>

        <label for="editUrl" class="modallabel">URL *</label>
        <input type="text" id="editUrl" name="url" placeholder="URL *" required>

        <label for="editName" class="modallabel">Contact Name (Optional)</label>
        <input type="text" id="editName" name="name" placeholder="Contact Name (Optional)">

        <label for="editEmail" class="modallabel">Contact Email (Optional)</label>
        <input type="text" id="editEmail" name="email" placeholder="Contact Email (Optional)">

        <label for="editPhone" class="modallabel">Contact Phone Number (Optional)</label>
        <input type="text" id="editPhone" name="phone" placeholder="Contact Phone Number (Optional)">

        <label for="editCategory" class="modallabel">Category *</label>
        <select id="editCategory" name="resource_category_id" required>
            <option value="">Category *</option>
            {% if categories %}
                {% for cat in categories %}
                    <option value="{{ cat.resource_category_id }}">{{ cat.resource_category_name|title }}</option>
                {% endfor %}
            {% else %}
                <option value="1">College</option>
                <option value="2">Mental</option>
                <option value="3">Jobs</option>
                <option value="4">Tutoring</option>
                <option value="5">Activities</option>
                <option value="6">Career</option>
            {% endif %}
        </select>

        <div class="modalformactions">
            <button type="button" onclick="closeEditModal()" class="modalbtncancel">Cancel</button>
            <button type="button" onclick="deleteResource()" class="modalbtndelete">Delete</button>
            <button type="submit" class="modalbtnsubmit">Save Changes</button>
        </div>
</div>
{% endblock %}
