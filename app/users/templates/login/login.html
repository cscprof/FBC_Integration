{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-blob">
        <h1>Log In</h1>
    <div class="underline"></div>


    <form class="login-form" action="/auth_login" method="POST">
        <input placeholder="Username" class="entry-box" type="text" name="username" required>

        <div class="password-box">
            <input placeholder="Password" type="password" name="password" id="password" required>
            <img src="{{ url_for('static', filename='images/eyeclosed.png') }}" id="eyeicon" alt="hide-password">
        </div>

        <script>
            let eyeicon = document.getElementById("eyeicon")
            let password = document.getElementById("password")

            eyeicon.onclick = function(){
                if (password.type == "password"){
                    password.type = "text";
                    eyeicon.src = "{{ url_for('static', filename='images/eyeopen.png') }}";
                }else{
                    password.type = "password";
                    eyeicon.src = "{{ url_for('static', filename='images/eyeclosed.png') }}";
                }
            }
        </script>


        <button class="button-submit" type="submit">Submit</button>
    </form>
    </div>

    <div class="signup-text">
        <h3>I don't have an account yet.</h3>
        <a class="button sign-up no-account" href="/signup">
            <strong>Sign up</strong>
        </a>
    </div>

</div>
{% endblock %}
