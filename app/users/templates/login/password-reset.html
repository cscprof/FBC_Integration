{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<style>
    .reset-password-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 20px;
    }
    .reset-blob {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }
    .reset-form .password-box {
        position: relative;
        margin: 20px 0;
    }
    .reset-form input#password {
        width: 100%;
        padding: 15px 50px 15px 15px;
        border: 2px solid #e1e5e9;
        border-radius: 12px;
        font-size: 16px;
        box-sizing: border-box;
    }
    .reset-form img#eyeicon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        cursor: pointer;
        z-index: 2;
    }
    .back-link {
        margin-top: 20px;
        text-align: center;
    }
    .back-link a {
        color: #666;
        text-decoration: none;
        font-weight: 500;
    }
    .back-link a:hover {
        color: #007bff;
    }
</style>

<div class="reset-password-container">
    <div class="reset-blob">
        <h1>Reset Your Password</h1>
        <div class="underline"></div>
        
        {% if email %}
        <p>Enter your new password for <strong>{{ email }}</strong>.</p>
        {% endif %}

        <!-- FIXED: Correct POST route + field name -->
        <form action="{{ url_for('users.reset_password', token=token) }}" method="POST" class="reset-form">
            <div class="password-box">
                <input 
                    placeholder="New Password (min 6 chars)" 
                    type="password" 
                    name="new_password"    
                    id="password" 
                    required 
                    minlength="6"
                >
                <img src="{{ url_for('static', filename='images/eyeclosed.png') }}" id="eyeicon" alt="Toggle Password">
            </div>

            <script>
                let eyeicon = document.getElementById("eyeicon");
                let password = document.getElementById("password");
                eyeicon.onclick = function() {
                    if (password.type === "password") {
                        password.type = "text";
                        eyeicon.src = "{{ url_for('static', filename='images/eyeopen.png') }}";
                    } else {
                        password.type = "password";
                        eyeicon.src = "{{ url_for('static', filename='images/eyeclosed.png') }}";
                    }
                }
            </script>

            <button class="button-submit" type="submit">Update Password</button>
        </form>
    </div>

    <div class="back-link">
        <a href="{{ url_for('users.forgot_password') }}">← Back to Forgot Password</a>
    </div>
</div>
{% endblock %}
