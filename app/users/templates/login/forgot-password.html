<!-- Very basic html page as generated by Perplexity, then hooked up to backend by my own hand-->
{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="forgot-password-container">
    <div class="forgot-blob">
        <h1>Forgot Password?</h1>
        <div class="underline"></div>

        <div class="forgot-options">
            <h3>Reset via Email</h3>
            <form action="/login/forgot-password-email" method="POST" class="forgot-form">
                <input placeholder="Enter your email" type="email" name="email" required>
                <button class="button-submit" type="submit">Send Reset Email</button>
            </form>

            <h3>Or via Username</h3>
            <form action="/login/forgot-password-username" method="POST" class="forgot-form">
                <input placeholder="Enter your username" type="text" name="username" required>
                <button class="button-submit" type="submit">Send Reset Info</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
