{% extends 'base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="edit-user-blob">
    <h1>Change Password: {{ user.username }}</h1>

    <form class="edit-profile-form" method="post"
          action="{{ url_for('users.change_password', username=user.username) }}">

        <label class="edituser-label">Current password:</label>
        <input class="edituser-entry-box" type="password" name="current_password" required autocomplete="current-password">

        <label class="edituser-label">New password:</label>
        <input class="edituser-entry-box" type="password" name="new_password" required autocomplete="new-password" minlength="8">

        <label class="edituser-label">Confirm new password:</label>
        <input class="edituser-entry-box" type="password" name="confirm_password" required autocomplete="new-password" minlength="8">

        <button class="edituser-button-submit" type="submit">Change Password</button>
    </form>

    <a href="{{ url_for('users.profile', username=user.username) }}" style="display:inline-block; margin-top:12px;">
        &larr; Back to profile
    </a>
</div>
{% endblock %}
