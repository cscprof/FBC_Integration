<!-- Very basic html page as generated by Perplexity, then hooked up to backend by my own hand-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    button { padding: 10px 16px; font-size: 16px; margin: 10px 0; }
    input { padding: 8px; font-size: 16px; width: 100%; margin: 5px 0 10px; }
  </style>
</head>
<body>
  <!-- Step 1: Request token button -->
  <div id="requestStep">
    <h2>Email Verification</h2>
    <p>Click the button below to request a verification email.</p>
    <button type="button" onclick="showEmailStep()">Request token</button>
  </div>

  <!-- Step 2: Enter email and send token -->
  <div id="emailStep" style="display: none;">
    <h2>Enter your email</h2>
    <form action="/email/verifyEmail" method="POST">
      <input
        type="email"
        name="email"
        value="{{ current_user.email }}"
        required
      >
      <button type="submit">Send verification token</button>
    </form>
    <p>Once sent, check your inbox and follow the link to verify.</p>
  </div>

  <script>
    function showEmailStep() {
      document.getElementById("requestStep").style.display = "none";
      document.getElementById("emailStep").style.display = "block";
    }
  </script>
</body>
</html>
